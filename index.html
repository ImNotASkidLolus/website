<script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
<script>
    const typed = new Typed('#typed-text', {
    strings: ['developer.', 'security researcher.', 'tech enthusiast.'],
    typeSpeed: 50,    // Speed in milliseconds
    backSpeed: 30,    // Backspacing speed
    loop: true        // Loop the animation infinitely
    });
</script>
<script>
  let originalTitle = document.title;
  let scrollInterval = null;
  let movingText = "======Already leaving me?======";

  // When the user switches tabs
  window.addEventListener('blur', () => {
    scrollInterval = setInterval(() => {
      movingText = movingText.substring(1) + movingText.substring(0, 1);
      document.title = movingText;
    }, 250);
  });

  // When the user clicks back onto your tab
  window.addEventListener('focus', () => {
    clearInterval(scrollInterval);
    document.title = originalTitle; // Reset to the normal title immediately
  });
</script>
